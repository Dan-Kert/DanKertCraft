name: Build DanKertLauncher EXE
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Liberica FULL - includes JavaFX)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'liberica' # Liberica Full содержит модули JavaFX
          architecture: x64

      - name: Build with Maven
        run: |
          mvn clean package -DskipTests=true
          mkdir dist
          copy target/DanKertCraft-*.jar dist/DanKertCraft.jar

      - name: Create EXE with jpackage
        run: |
          # путь к модулям в JDK
          $JMODS_PATH = "$env:JAVA_HOME\jmods"
          
          jpackage `
            --type exe `
            --dest output `
            --name "DanKertCraft" `
            --input dist `
            --main-jar DanKertCraft.jar `
            --main-class md.dankert.dankertcraft.Launcher `
            --module-path $JMODS_PATH `
            --add-modules java.base,java.desktop,java.logging,java.net.http,javafx.controls,javafx.graphics `
            --win-shortcut `
            --win-menu `
            --win-dir-chooser `
            --vendor "DanKert Studio" `
            --app-version "1.2.0" `
            --java-options "-Xmx2G -Dfile.encoding=UTF-8"
          # --icon src/main/resources/icons/mak.ico (если есть)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DanKertCraft-Windows-Installer
          path: output/*.exe
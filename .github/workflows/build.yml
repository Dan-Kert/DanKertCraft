name: Build DanKertLauncher EXE
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 with JavaFX
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'liberica'
          architecture: 'x64'

      - name: Build JAR and EXE
        run: |
          # 1. Создаем папку для компиляции
          if (!(Test-Path out_build)) { mkdir out_build }
          
          # 2. Находим все Java файлы
          $sources = Get-ChildItem -Path src/main/java -Filter *.java -Recurse | Resolve-Path -Relative
          
          # 3. КОМПИЛЯЦИЯ С ПОДКЛЮЧЕНИЕМ МОДУЛЕЙ JAVAFX
          # Мы берем модули прямо из папки jmods установленного JDK
          javac --module-path $env:JAVA_HOME/jmods `
                --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.media `
                -encoding utf8 -cp "libs/*" -d out_build $sources
          
          # 4. Копируем ресурсы
          if (Test-Path src/main/resources) {
            Copy-Item -Path src/main/resources/* -Destination out_build -Recurse -Force
          }
          
          # 5. Собираем JAR
          jar --create --file DanKertCraft.jar --main-class md.dankert.dankertcraft.Main -C out_build .
          
          # 6. Собираем EXE
          jpackage --type exe `
            --name DanKertLauncher `
            --input . `
            --main-jar DanKertCraft.jar `
            --main-class md.dankert.dankertcraft.Main `
            --module-path "$env:JAVA_HOME/jmods" `
            --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.media `
            --win-shortcut `
            --win-menu `
            --vendor "DanKertCraft" `
            --description "Minecraft Launcher by DanKert"

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DanKertLauncher-Windows
          path: "*.exe"

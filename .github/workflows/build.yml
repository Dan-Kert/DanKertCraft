name: Build DanKertLauncher EXE
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Liberica Full JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'liberica'
          # Важно: это заставляет экшен искать Full-версию с JavaFX
          check-latest: false

      - name: Build JAR and EXE
        run: |
          # 1. Подготовка
          if (!(Test-Path out_build)) { mkdir out_build }
          
          # 2. Указываем путь к модулям JavaFX вручную
          # В Liberica Full они лежат в папке jmods
          $JAVA_MODS = "$env:JAVA_HOME\jmods"
          echo "JDK Path: $env:JAVA_HOME"
          echo "Checking JMODS at: $JAVA_MODS"

          # 3. Список файлов
          $sources = Get-ChildItem -Path src/main/java -Filter *.java -Recurse | Resolve-Path -Relative
          
          # 4. КОМПИЛЯЦИЯ С ЯВНЫМ УКАЗАНИЕМ МОДУЛЕЙ
          javac --module-path "$JAVA_MODS" `
                --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.media `
                -encoding utf8 -cp "libs/*" -d out_build $sources
          
          # 5. Копируем ресурсы
          if (Test-Path src/main/resources) {
            Copy-Item -Path src/main/resources/* -Destination out_build -Recurse -Force
          }
          
          # 6. Собираем JAR
          jar --create --file DanKertCraft.jar --main-class md.dankert.dankertcraft.Main -C out_build .
          
          # 7. Собираем EXE
          jpackage --type exe `
            --name DanKertLauncher `
            --input . `
            --main-jar DanKertCraft.jar `
            --main-class md.dankert.dankertcraft.Main `
            --module-path "$JAVA_MODS" `
            --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.media `
            --win-shortcut `
            --win-menu `
            --vendor "DanKertCraft"
      
      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DanKertLauncher-Windows
          path: "*.exe"

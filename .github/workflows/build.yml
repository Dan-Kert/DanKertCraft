name: Build DanKertLauncher EXE
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Liberica FULL - includes JavaFX)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'liberica' # Liberica Full содержит модули JavaFX
          architecture: x64

      - name: Build with Maven
        run: |
          mvn clean package -DskipTests=true
          mkdir dist
          copy target/DanKertCraft-*.jar dist/DanKertCraft.jar

      - name: Create EXE with jpackage
        run: |
          # Мы НЕ используем --module-path и --add-modules, 
          # так как все зависимости уже внутри Fat JAR.
          
          jpackage `
            --type exe `
            --dest output `
            --name "DanKertCraft" `
            --vendor "DanKert Studio" `
            --description "The Ultimate Minecraft Launcher by DanKert" `
            --app-version "1.0.0" `
            --input dist `
            --main-jar DanKertCraft.jar `
            --main-class md.dankert.dankertcraft.Main `
            --win-shortcut `
            --win-menu `
            --win-dir-chooser `
            --java-options "-Xmx2G -Xms512M -Dfile.encoding=UTF-8" `
            --win-upgrade-uuid "d85b1a20-1234-4abc-bd12-87654321abcd"
            
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DanKertCraft-Windows-Installer
          path: output/*.exe
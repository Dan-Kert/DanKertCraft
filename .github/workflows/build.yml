name: Build DanKertLauncher EXE
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 with JavaFX
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'liberica' # Liberica от BellSoft всегда включает JavaFX в этом экшене
          architecture: 'x64'

      - name: Build JAR and EXE
        run: |
          # Создаем папку для компиляции
          if (!(Test-Path out_build)) { mkdir out_build }
          
          # Находим все Java файлы
          $sources = Get-ChildItem -Path src/main/java -Filter *.java -Recurse | Resolve-Path -Relative
          
          # Компилируем с библиотекой GSON
          javac -cp "libs/*" -d out_build $sources
          
          # Копируем ресурсы (иконки и т.д.)
          if (Test-Path src/main/resources) {
            Copy-Item -Path src/main/resources/* -Destination out_build -Recurse -Force
          }
          
          # Собираем JAR
          jar --create --file DanKertCraft.jar --main-class md.dankert.dankertcraft.Main -C out_build .
          
          # Собираем EXE через jpackage
          jpackage --type exe `
            --name DanKertLauncher `
            --input . `
            --main-jar DanKertCraft.jar `
            --main-class md.dankert.dankertcraft.Main `
            --win-shortcut `
            --win-menu `
            --vendor "DanKertCraft" `
            --description "Minecraft Launcher by DanKert"

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DanKertLauncher-Windows
          path: "*.exe"

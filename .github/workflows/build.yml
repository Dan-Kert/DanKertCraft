name: Build DanKertLauncher EXE
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Liberica FULL - includes JavaFX)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'liberica'
          architecture: x64

      - name: Build with Maven
        run: |
          # Используем -Dmaven.test.skip=true чтобы полностью игнорировать сломанные тесты
          mvn clean package -Dmaven.test.skip=true
          mkdir dist
          copy target/DanKertCraft-*.jar dist/DanKertCraft.jar

      - name: Create EXE with jpackage
        run: |
          jpackage `
            --type exe `
            --dest output `
            --name "DanKertCraft" `
            --vendor "DanKert" `
            --description "The Ultimate Minecraft Launcher by DanKert" `
            --app-version "1.0.${{ github.run_number }}" `
            --input dist `
            --main-jar DanKertCraft.jar `
            --main-class md.dankert.dankertcraft.Main `
            --icon "logo.ico" `
            --win-shortcut `
            --win-menu `
            --win-console `
            --win-dir-chooser `
            --java-options "-Xmx2G -Xms512M -Dfile.encoding=UTF-8" `
            --win-upgrade-uuid "d85b1a20-1234-4abc-bd12-87654321abcd"
            
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DanKertCraft-Windows-v1.0.${{ github.run_number }}
          path: output/*.exe

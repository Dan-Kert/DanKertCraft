name: Build DanKertLauncher EXE
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin' # Стандартный надежный JDK

      - name: Download JavaFX JMODS
        run: |
          # Скачиваем официальные модули JavaFX 17.0.10
          Invoke-WebRequest -Uri https://gluonhq.com/download/javafx-17-0-10-jmods-windows/ -OutFile javafx-jmods.zip
          Expand-Archive -Path javafx-jmods.zip -DestinationPath .
          # Папка после распаковки обычно называется javafx-jmods-17.0.10

      - name: Build JAR and EXE
        run: |
          if (!(Test-Path out_build)) { mkdir out_build }
          
          # Путь к скачанным модулям JavaFX
          $FX_MODS = "javafx-jmods-17.0.10"
          
          # Список файлов
          $sources = Get-ChildItem -Path src/main/java -Filter *.java -Recurse | Resolve-Path -Relative
          
          # 1. Компиляция (Подключаем скачанные JMODS и твои библиотеки из libs)
          javac --module-path $FX_MODS `
                --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.media `
                -encoding utf8 -cp "libs/*" -d out_build $sources
          
          # 2. Ресурсы
          if (Test-Path src/main/resources) {
            Copy-Item -Path src/main/resources/* -Destination out_build -Recurse -Force
          }
          
          # 3. Создаем JAR
          jar --create --file DanKertCraft.jar --main-class md.dankert.dankertcraft.Main -C out_build .
          
          # 4. Собираем EXE (Указываем jpackage использовать и системные модули, и скачанные FX)
          jpackage --type exe `
            --name DanKertLauncher `
            --input . `
            --main-jar DanKertCraft.jar `
            --main-class md.dankert.dankertcraft.Main `
            --module-path "${env:JAVA_HOME}\jmods;$FX_MODS" `
            --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.media `
            --win-shortcut `
            --win-menu `
            --vendor "DanKertCraft"

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DanKertLauncher-Windows
          path: "*.exe"

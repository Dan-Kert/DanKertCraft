name: Build DanKertLauncher EXE
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Liberica FULL - includes JavaFX)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'liberica'
          architecture: x64

      - name: Build with Maven
        # Оборачиваем аргумент в кавычки для PowerShell и используем правильный флаг игнорирования тестов
        run: mvn clean package "-Dmaven.test.skip=true"

      - name: Prepare distribution
        # Создаем папку и копируем JAR только после успешной сборки
        run: |
          mkdir dist
          copy target/DanKertCraft-*.jar dist/DanKertCraft.jar

      - name: Create EXE with jpackage
        run: |
          # Проверяем, существует ли иконка, чтобы билд не упал в самом конце
          if (!(Test-Path "logo.ico")) { 
            Write-Host "⚠️ Файл logo.ico не найден! jpackage может выдать ошибку." 
          }

          jpackage `
            --type exe `
            --dest output `
            --name "DanKertCraft" `
            --vendor "DanKert" `
            --description "The Ultimate Minecraft Launcher by DanKert" `
            --app-version "1.0.${{ github.run_number }}" `
            --input dist `
            --main-jar DanKertCraft.jar `
            --main-class md.dankert.dankertcraft.Main `
            --icon "logo.ico" `
            --win-shortcut `
            --win-menu `
            --win-console `
            --win-dir-chooser `
            --java-options "-Xmx2G -Xms512M -Dfile.encoding=UTF-8" `
            --win-upgrade-uuid "d85b1a20-1234-4abc-bd12-87654321abcd"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DanKertCraft-Windows-v1.0.${{ github.run_number }}
          path: output/*.exe

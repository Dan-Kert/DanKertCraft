name: Build DanKertLauncher EXE
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JavaFX Modules
        run: |
          mkdir javafx-sdk
          $modules = "controls", "fxml", "graphics", "media", "base"
          foreach ($mod in $modules) {
            $url = "https://repo1.maven.org/maven2/org/openjfx/javafx-$mod/17.0.10/javafx-$mod-17.0.10-win.jar"
            Invoke-WebRequest -Uri $url -OutFile "javafx-sdk/javafx-$mod.jar"
          }

      - name: Build JAR and EXE
        run: |
          # 1. Подготовка
          if (Test-Path out_build) { Remove-Item -Recurse -Force out_build }
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          mkdir out_build
          mkdir dist
          
          # 2. Компиляция
          Get-ChildItem -Path src/main/java -Filter *.java -Recurse | ForEach-Object { $_.FullName } | Out-File -FilePath sources.txt -Encoding utf8
          javac -encoding utf8 -cp "javafx-sdk/*;libs/gson-2.10.1.jar" -d out_build "@sources.txt"
          
          # 3. Копируем ресурсы и РАСПАКОВЫВАЕМ GSON внутрь (Fat JAR фикс)
          if (Test-Path src/main/resources) {
            Copy-Item -Path src/main/resources/* -Destination out_build -Recurse -Force
          }
          cd out_build
          jar -xf ../libs/gson-2.10.1.jar  # Распаковка Gson для слияния
          Remove-Item -Recurse -Force META-INF # Чистим подписи библиотеки
          cd ..
          
          # 4. Создаем JAR
          jar --create --file dist/DanKertCraft.jar --main-class md.dankert.dankertcraft.Main -C out_build .
          
          # 5. Сборка EXE с кастомизацией
          jpackage --type exe `
            --name "DanKertCraft" `
            --vendor "DanKert Studio" `
            --description "The Ultimate Minecraft Launcher by DanKert" `
            --app-version "1.2.0" `
            --icon "logo.ico" `
            --input dist `
            --dest . `
            --main-jar DanKertCraft.jar `
            --main-class md.dankert.dankertcraft.Main `
            --module-path "${env:JAVA_HOME}\jmods;javafx-sdk" `
            --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.media,jdk.crypto.ec,java.net.http `
            --win-shortcut `
            --win-menu `
            --win-dir-chooser `
            --win-shortcut-prompt `
            --java-options "-Xmx2G -Xms512M -Dfile.encoding=UTF-8" `
            --install-dir "DanKertCraftLauncher" `
            --win-upgrade-uuid "d85b1a20-1234-4abc-bd12-87654321abcd"

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DanKertCraft-Windows-Installer
          path: "*.exe"